components:
  securitySchemes:
    awsAuth:
      type: apiKey
      in: header
      name: Authorization
      description: AWS Signature Version 4 authentication
  schemas:
    ErrorResponse:
      type: object
      description: Standard error response from the AppSync API
      properties:
        message:
          type: string
          description: Error message
          example: Resource not found
        errorType:
          type: string
          description: Error type
          example: NotFoundException
    GraphqlApi:
      type: object
      description: A GraphQL API object managed by AppSync
      properties:
        apiId:
          type: string
          description: The API ID
          example: abc123def456
        name:
          type: string
          description: The API name
          example: MyGraphQLAPI
        authenticationType:
          type: string
          description: The default authentication type
          enum: [API_KEY, AWS_IAM, AMAZON_COGNITO_USER_POOLS, OPENID_CONNECT, AWS_LAMBDA]
          example: API_KEY
        arn:
          type: string
          description: The ARN of the API
          example: arn:aws:appsync:us-east-1:123456789012:apis/abc123def456
        uris:
          type: object
          description: The URIs for the API endpoint
          additionalProperties:
            type: string
        tags:
          type: object
          description: Tags on the API
          additionalProperties:
            type: string
        additionalAuthenticationProviders:
          type: array
          description: Additional authentication providers
          items:
            $ref: '#/components/schemas/AdditionalAuthenticationProvider'
        logConfig:
          $ref: '#/components/schemas/LogConfig'
        xrayEnabled:
          type: boolean
          description: Whether X-Ray tracing is enabled
          example: false
        wafWebAclArn:
          type: string
          description: WAF Web ACL ARN
          example: ''
        lambdaAuthorizerConfig:
          $ref: '#/components/schemas/LambdaAuthorizerConfig'
        visibility:
          type: string
          description: API visibility
          enum: [GLOBAL, PRIVATE]
          example: GLOBAL
        apiType:
          type: string
          description: API type
          enum: [GRAPHQL, MERGED]
          example: GRAPHQL
    AdditionalAuthenticationProvider:
      type: object
      description: An additional authentication provider for a GraphQL API
      properties:
        authenticationType:
          type: string
          description: Authentication type
          example: AWS_IAM
        lambdaAuthorizerConfig:
          $ref: '#/components/schemas/LambdaAuthorizerConfig'
        userPoolConfig:
          $ref: '#/components/schemas/CognitoUserPoolConfig'
    LogConfig:
      type: object
      description: Logging configuration for a GraphQL API
      properties:
