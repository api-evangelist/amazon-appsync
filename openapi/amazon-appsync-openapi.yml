openapi: 3.1.0
info:
  title: Amazon AppSync API
  description: >-
    The Amazon AppSync API enables programmatic management of GraphQL APIs, including creating and configuring data sources, resolvers, functions, API keys, types, and managing GraphQL schema definitions. AppSync makes it easy to build data-driven mobile and web applications.
  version: '2017-07-25'
  contact:
    name: AWS Support
    url: https://aws.amazon.com/contact-us/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: https://appsync.us-east-1.amazonaws.com
    description: Amazon AppSync US East (N. Virginia)
  - url: https://appsync.eu-west-1.amazonaws.com
    description: Amazon AppSync EU (Ireland)
security:
  - awsAuth: []
tags:
  - name: GraphQL APIs
    description: Manage GraphQL API configurations
  - name: Data Sources
    description: Manage data sources connected to GraphQL APIs
  - name: Resolvers
    description: Manage field resolvers for GraphQL types
  - name: Functions
    description: Manage reusable pipeline resolver functions
  - name: Types
    description: Manage GraphQL type definitions
  - name: Schema
    description: Manage GraphQL schema documents
  - name: Api Keys
    description: Manage API keys for authentication
  - name: Domain Names
    description: Manage custom domain names for AppSync APIs
  - name: Source Api Associations
    description: Manage source API associations for merged APIs
  - name: Tags
    description: Resource tagging operations
paths:
  /v1/apis:
    post:
      operationId: createGraphqlApi
      summary: Amazon AppSync Create GraphQL Api
      description: Creates a new GraphQL API.
      tags:
        - GraphQL APIs
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGraphqlApiRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  name: MyGraphQLAPI
                  authenticationType: API_KEY
      responses:
        '200':
          description: GraphQL API created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateGraphqlApiResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    graphqlApi:
                      apiId: abc123def456
                      name: MyGraphQLAPI
                      authenticationType: API_KEY
                      arn: arn:aws:appsync:us-east-1:123456789012:apis/abc123def456
                      uris:
                        GRAPHQL: https://abc123def456.appsync-api.us-east-1.amazonaws.com/graphql
                      tags: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      operationId: listGraphqlApis
      summary: Amazon AppSync List GraphQL Apis
      description: Lists your GraphQL APIs.
      tags:
        - GraphQL APIs
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: nextToken
          in: query
          description: Pagination token
          schema:
            type: string
        - name: maxResults
          in: query
          description: Maximum results to return
          schema:
            type: integer
      responses:
        '200':
          description: List of GraphQL APIs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListGraphqlApisResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    graphqlApis:
                      - apiId: abc123def456
                        name: MyGraphQLAPI
                        authenticationType: API_KEY
                        arn: arn:aws:appsync:us-east-1:123456789012:apis/abc123def456
                    nextToken: ''
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/apis/{apiId}:
    get:
      operationId: getGraphqlApi
      summary: Amazon AppSync Get GraphQL Api
      description: Retrieves a GraphQL API by its ID.
      tags:
        - GraphQL APIs
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: apiId
          in: path
          required: true
          description: The API ID
          schema:
            type: string
      responses:
        '200':
          description: GraphQL API retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetGraphqlApiResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    graphqlApi:
                      apiId: abc123def456
                      name: MyGraphQLAPI
                      authenticationType: API_KEY
                      arn: arn:aws:appsync:us-east-1:123456789012:apis/abc123def456
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateGraphqlApi
      summary: Amazon AppSync Update GraphQL Api
      description: Updates a GraphQL API.
      tags:
        - GraphQL APIs
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: apiId
          in: path
          required: true
          description: The API ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGraphqlApiRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  name: UpdatedGraphQLAPI
                  authenticationType: API_KEY
      responses:
        '200':
          description: GraphQL API updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateGraphqlApiResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    graphqlApi:
                      apiId: abc123def456
                      name: UpdatedGraphQLAPI
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteGraphqlApi
      summary: Amazon AppSync Delete GraphQL Api
      description: Deletes a GraphQL API.
      tags:
        - GraphQL APIs
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: apiId
          in: path
          required: true
          description: The API ID
          schema:
            type: string
      responses:
        '200':
          description: GraphQL API deleted
          content:
            application/json:
              schema:
                type: object
              examples:
                default:
                  x-microcks-default: true
                  value: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/apis/{apiId}/datasources:
    post:
      operationId: createDataSource
      summary: Amazon AppSync Create Data Source
      description: Creates a DataSource object.
      tags:
        - Data Sources
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: apiId
          in: path
          required: true
          description: The API ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDataSourceRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  name: MyDynamoDBDataSource
                  type: AMAZON_DYNAMODB
                  serviceRoleArn: arn:aws:iam::123456789012:role/appsync-role
                  dynamodbConfig:
                    tableName: MyTable
                    awsRegion: us-east-1
      responses:
        '200':
          description: Data source created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDataSourceResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    dataSource:
                      name: MyDynamoDBDataSource
                      type: AMAZON_DYNAMODB
                      dataSourceArn: arn:aws:appsync:us-east-1:123456789012:apis/abc123/datasources/MyDynamoDBDataSource
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      operationId: listDataSources
      summary: Amazon AppSync List Data Sources
      description: Lists the data sources for a given API.
      tags:
        - Data Sources
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: apiId
          in: path
          required: true
          description: The API ID
          schema:
            type: string
        - name: nextToken
          in: query
          schema:
            type: string
        - name: maxResults
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of data sources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDataSourcesResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    dataSources:
                      - name: MyDynamoDBDataSource
                        type: AMAZON_DYNAMODB
                    nextToken: ''
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/apis/{apiId}/datasources/{name}:
    get:
      operationId: getDataSource
      summary: Amazon AppSync Get Data Source
      description: Retrieves a DataSource object by name.
      tags:
        - Data Sources
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Data source retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDataSourceResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    dataSource:
                      name: MyDynamoDBDataSource
                      type: AMAZON_DYNAMODB
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateDataSource
      summary: Amazon AppSync Update Data Source
      description: Updates a DataSource object.
      tags:
        - Data Sources
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDataSourceRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  type: AMAZON_DYNAMODB
                  serviceRoleArn: arn:aws:iam::123456789012:role/appsync-role
      responses:
        '200':
          description: Data source updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateDataSourceResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    dataSource:
                      name: MyDynamoDBDataSource
                      type: AMAZON_DYNAMODB
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteDataSource
      summary: Amazon AppSync Delete Data Source
      description: Deletes a DataSource object.
      tags:
        - Data Sources
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Data source deleted
          content:
            application/json:
              schema:
                type: object
              examples:
                default:
                  x-microcks-default: true
                  value: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/apis/{apiId}/types/{typeName}/resolvers:
    post:
      operationId: createResolver
      summary: Amazon AppSync Create Resolver
      description: Creates a Resolver object. A resolver converts incoming requests into a format that a data source can understand, and converts the data source's responses into GraphQL.
      tags:
        - Resolvers
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
        - name: typeName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResolverRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  fieldName: getPost
                  dataSourceName: MyDynamoDBDataSource
                  kind: UNIT
                  requestMappingTemplate: '{"version":"2018-05-29","operation":"GetItem","key":{"id":$util.dynamodb.toDynamoDBJson($ctx.args.id)}}'
                  responseMappingTemplate: '$util.toJson($ctx.result)'
      responses:
        '200':
          description: Resolver created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResolverResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    resolver:
                      typeName: Query
                      fieldName: getPost
                      dataSourceName: MyDynamoDBDataSource
                      kind: UNIT
                      resolverArn: arn:aws:appsync:us-east-1:123456789012:apis/abc123/types/Query/resolvers/getPost
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      operationId: listResolvers
      summary: Amazon AppSync List Resolvers
      description: Lists the resolvers for a given API and type.
      tags:
        - Resolvers
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
        - name: typeName
          in: path
          required: true
          schema:
            type: string
        - name: nextToken
          in: query
          schema:
            type: string
        - name: maxResults
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of resolvers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResolversResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    resolvers:
                      - typeName: Query
                        fieldName: getPost
                        dataSourceName: MyDynamoDBDataSource
                    nextToken: ''
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/apis/{apiId}/types/{typeName}/resolvers/{fieldName}:
    get:
      operationId: getResolver
      summary: Amazon AppSync Get Resolver
      description: Retrieves a Resolver object.
      tags:
        - Resolvers
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
        - name: typeName
          in: path
          required: true
          schema:
            type: string
        - name: fieldName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resolver retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetResolverResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    resolver:
                      typeName: Query
                      fieldName: getPost
                      dataSourceName: MyDynamoDBDataSource
                      kind: UNIT
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateResolver
      summary: Amazon AppSync Update Resolver
      description: Updates a Resolver object.
      tags:
        - Resolvers
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
        - name: typeName
          in: path
          required: true
          schema:
            type: string
        - name: fieldName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResolverRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  dataSourceName: MyDynamoDBDataSource
                  kind: UNIT
      responses:
        '200':
          description: Resolver updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateResolverResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    resolver:
                      typeName: Query
                      fieldName: getPost
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteResolver
      summary: Amazon AppSync Delete Resolver
      description: Deletes a Resolver object.
      tags:
        - Resolvers
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
        - name: typeName
          in: path
          required: true
          schema:
            type: string
        - name: fieldName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resolver deleted
          content:
            application/json:
              schema:
                type: object
              examples:
                default:
                  x-microcks-default: true
                  value: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/apis/{apiId}/functions:
    post:
      operationId: createFunction
      summary: Amazon AppSync Create Function
      description: Creates a Function object. A function is a reusable entity. Multiple functions can be used to compose the resolver logic.
      tags:
        - Functions
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFunctionRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  name: GetPostFunction
                  dataSourceName: MyDynamoDBDataSource
                  functionVersion: '2018-05-29'
                  requestMappingTemplate: '{"version":"2018-05-29","operation":"GetItem","key":{"id":$util.dynamodb.toDynamoDBJson($ctx.args.id)}}'
                  responseMappingTemplate: '$util.toJson($ctx.result)'
      responses:
        '200':
          description: Function created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFunctionResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    functionConfiguration:
                      functionId: abc123456789
                      name: GetPostFunction
                      dataSourceName: MyDynamoDBDataSource
                      functionArn: arn:aws:appsync:us-east-1:123456789012:apis/abc123/functions/abc123456789
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      operationId: listFunctions
      summary: Amazon AppSync List Functions
      description: List multiple functions.
      tags:
        - Functions
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
        - name: nextToken
          in: query
          schema:
            type: string
        - name: maxResults
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of functions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFunctionsResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    functions:
                      - functionId: abc123456789
                        name: GetPostFunction
                        dataSourceName: MyDynamoDBDataSource
                    nextToken: ''
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/apis/{apiId}/functions/{functionId}:
    get:
      operationId: getFunction
      summary: Amazon AppSync Get Function
      description: Get a Function object.
      tags:
        - Functions
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
        - name: functionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Function retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFunctionResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    functionConfiguration:
                      functionId: abc123456789
                      name: GetPostFunction
                      dataSourceName: MyDynamoDBDataSource
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateFunction
      summary: Amazon AppSync Update Function
      description: Updates a Function object.
      tags:
        - Functions
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
        - name: functionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFunctionRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  name: UpdatedFunction
                  dataSourceName: MyDynamoDBDataSource
                  functionVersion: '2018-05-29'
      responses:
        '200':
          description: Function updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateFunctionResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    functionConfiguration:
                      functionId: abc123456789
                      name: UpdatedFunction
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteFunction
      summary: Amazon AppSync Delete Function
      description: Deletes a Function.
      tags:
        - Functions
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
        - name: functionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Function deleted
          content:
            application/json:
              schema:
                type: object
              examples:
                default:
                  x-microcks-default: true
                  value: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/apis/{apiId}/types:
    post:
      operationId: createType
      summary: Amazon AppSync Create Type
      description: Creates a Type object.
      tags:
        - Types
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTypeRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  definition: 'type Post { id: ID! title: String author: String }'
                  format: SDL
      responses:
        '200':
          description: Type created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTypeResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    type:
                      name: Post
                      format: SDL
                      definition: 'type Post { id: ID! title: String author: String }'
                      arn: arn:aws:appsync:us-east-1:123456789012:apis/abc123/types/Post
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      operationId: listTypes
      summary: Amazon AppSync List Types
      description: Lists the types for a given API.
      tags:
        - Types
      x-microcks-operation:
