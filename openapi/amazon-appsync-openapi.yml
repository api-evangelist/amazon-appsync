      type: object
      description: Request to add tags to a resource
      required:
        - tags
      properties:
        tags:
          type: object
          description: Tags to add
          additionalProperties:
            type: string
    EvaluateMappingTemplateRequest:
      type: object
      description: Request to evaluate a mapping template
      required:
        - template
        - context
      properties:
        template:
          type: string
          description: The mapping template to evaluate
          example: '{"version":"2018-05-29","operation":"GetItem"}'
        context:
          type: string
          description: The template context as a JSON string
          example: '{"arguments":{"id":"123"}}'
    EvaluateMappingTemplateResponse:
      type: object
      description: Response from evaluating a mapping template
      properties:
        evaluationResult:
          type: string
          description: The evaluated template result
          example: '{"version":"2018-05-29","operation":"GetItem","key":{"id":{"S":"123"}}}'
        error:
          type: object
          description: Error from template evaluation if any
        logs:
          type: array
          description: Evaluation log messages
          items:
            type: string
    GetIntrospectionSchemaResponse:
      type: object
      description: Response with introspection schema
      properties:
        schema:
          type: string
          description: The introspection schema in the requested format
          example: 'type Query { getPost(id: ID!): Post } type Post { id: ID! title: String }'
