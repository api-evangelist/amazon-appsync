name: Amazon AppSync
description: >-
  Amazon AppSync is a fully managed service that makes it easy to develop
  GraphQL APIs by handling the heavy lifting of securely connecting to data
  sources like AWS DynamoDB, Lambda, and more. It supports real-time data
  synchronization and offline programming features.
